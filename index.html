<!DOCTYPE html>

    <!-- CJK fonts: Noto/Source Han Serif, Nanum Gothic, and Chiron GoRound TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Nanum+Gothic:wght@700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/chiron-go-round-tc-webfont@1.0.11/css/vf.css" rel="stylesheet" />

    <link rel="preload" href="/fonts/ChicagoKare-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <title>ryOS</title>
    
    <!-- Stale bundle detection: reload if cached index.html references missing JS bundles -->
    <script>
      (function() {
        var reloadKey = 'ryos-stale-reload';

        // After a successful recovery redirect (?_cb= present), clear the
        // cooldown flag so listeners below get a fresh attempt.  Without
        // this the 10 s cooldown from the *previous* page load would cause
        // the IIFE to bail and never attach error listeners — leaving the
        // page defenceless if a different chunk still 404s.
        try {
          if (window.location.search.indexOf('_cb=') !== -1) {
            sessionStorage.removeItem(reloadKey);
          }
        } catch (e) { /* sessionStorage may throw */ }

        // Guard to prevent multiple reload attempts on the same page load
        var isReloading = false;

        // ---- error listeners (always attached) ----

        // <script> tag load errors (capture phase)
        window.addEventListener('error', function(event) {
          if (isReloading) return;
          var target = event.target || event.srcElement;
          if (target && target.tagName === 'SCRIPT') {
            var src = target.src || '';
            if (src.indexOf('/assets/') !== -1 && src.indexOf('.js') !== -1) {
              console.error('[ryOS] Bundle failed to load:', src);
              triggerStaleReload('Script tag error: ' + src);
            }
          }
        }, true);

        // Dynamic import / module failures (unhandled rejections)
        window.addEventListener('unhandledrejection', function(event) {
          if (isReloading) return;
          var reason = event.reason;
          if (!reason) return;

          var message = reason.message || String(reason);
          var stack = reason.stack || '';

          var isModuleError =
            message.indexOf('dynamically imported module') !== -1 ||
            message.indexOf('Loading module') !== -1 ||
            message.indexOf('module script failed') !== -1 ||
            message.indexOf('Unable to preload CSS') !== -1;

          var isAssetError =
            (message.indexOf('/assets/') !== -1 && message.indexOf('.js') !== -1) ||
            (stack.indexOf('/assets/') !== -1 && stack.indexOf('.js') !== -1);

          if (isModuleError || isAssetError) {
            console.error('[ryOS] Module import failed:', message);
            triggerStaleReload('Module import error: ' + message);
          }
        });

        // ---- recovery flow ----

        function triggerStaleReload(reason) {
          if (isReloading) return;

          // Counter-based loop guard (shared with prefetch.ts and main.tsx)
          var countKey = 'ryos:reload-count';
          var windowKey = 'ryos:reload-window-start';
          try {
            var now = Date.now();
            var count = parseInt(sessionStorage.getItem(countKey) || '0', 10);
            var wStart = parseInt(sessionStorage.getItem(windowKey) || '0', 10);
            if (wStart && now - wStart <= 60000 && count >= 3) {
              console.warn('[ryOS] Too many reloads (' + count + '), stopping to prevent loop');
              return;
            }
            if (!wStart || now - wStart > 60000) {
              sessionStorage.setItem(windowKey, String(now));
              sessionStorage.setItem(countKey, '1');
            } else {
              sessionStorage.setItem(countKey, String(count + 1));
            }
          } catch (e) { /* sessionStorage may throw */ }

          // Cooldown check — prevent rapid-fire reloads (10 s window)
          var lastReload = sessionStorage.getItem(reloadKey);
          if (lastReload && (Date.now() - parseInt(lastReload, 10)) < 10000) {
            console.warn('[ryOS] Recently reloaded for stale bundle, skipping to prevent loop');
            return;
          }

          isReloading = true;
          console.warn('[ryOS] Stale bundle detected, clearing caches and reloading...', reason);
          sessionStorage.setItem(reloadKey, String(Date.now()));

          if (window.caches) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(name) {
                return caches.delete(name);
              }));
            }).then(function() {
              console.log('[ryOS] Caches cleared');
              doReload();
            }).catch(function() {
              doReload();
            });
          } else {
            doReload();
          }
        }

        function doReload() {
          if (navigator.serviceWorker) {
            navigator.serviceWorker.getRegistration().then(function(reg) {
              if (reg) {
                reg.unregister().then(function() {
                  console.log('[ryOS] Service worker unregistered');
                  forceReload();
                }).catch(function() {
                  forceReload();
                });
              } else {
                forceReload();
              }
            }).catch(function() {
              forceReload();
            });
          } else {
            forceReload();
          }
        }

        function forceReload() {
          var url = new URL(window.location.href);
          url.searchParams.set('_cb', Date.now());
          window.location.replace(url.toString());
        }
      })();
    </script>
  </head>
  <body style="background-color: #000; margin: 0">
    <script src="/theme-bootstrap-config.js"></script>
    <script>
      (function () {
        try {
          var rawTheme = localStorage.getItem("ryos:theme") || localStorage.getItem("os_theme");
          var config = window.__RYOS_THEME_BOOTSTRAP__ || {
            defaultTheme: "macosx",
            defaultAquaMaterial: "glass",
            themes: {
              system7: { platform: "mac", macChrome: "system7", supportsDarkMode: false },
              macosx: { platform: "mac", macChrome: "aqua", supportsDarkMode: true },
              xp: { platform: "windows", macChrome: null, supportsDarkMode: false },
              win98: { platform: "windows", macChrome: null, supportsDarkMode: false },
            },
          };
          var themeConfig = rawTheme && config.themes && config.themes[rawTheme];
          var theme = themeConfig ? rawTheme : config.defaultTheme || "macosx";
          themeConfig = config.themes && config.themes[theme];
          var root = document.documentElement;
          root.dataset.osTheme = theme;
          // Mirror the platform/chrome attributes the React store will set later so first paint matches.
          var platform = themeConfig && themeConfig.platform ? themeConfig.platform : "mac";
          root.dataset.osPlatform = platform;
          if (themeConfig && themeConfig.macChrome) {
            root.dataset.osMacChrome = themeConfig.macChrome;
          } else {
            delete root.dataset.osMacChrome;
          }
          // Aqua material is a separate preference from the OS theme. Preserve
          // explicit saved choices; default missing/invalid storage to Glass.
          var rawAquaMaterial = localStorage.getItem("ryos:theme:aqua-material");
          var aquaMaterial =
            rawAquaMaterial === "classic" || rawAquaMaterial === "glass"
              ? rawAquaMaterial
              : config.defaultAquaMaterial || "glass";
          if (theme === "macosx" && aquaMaterial === "glass") {
            root.dataset.osAquaMaterial = "glass";
          } else {
            delete root.dataset.osAquaMaterial;
          }
          // Dark mode is per-theme, only honored when the theme advertises support.
          // Match useThemeStore#effectiveDarkFor (string prefs + legacy booleans + system).
          var supportsDark = !!(themeConfig && themeConfig.supportsDarkMode);
          var systemDark = false;
          try {
            systemDark =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches;
          } catch (e0) {}

          var isDarkBoot = false;
          if (supportsDark) {
            try {
              var rawDark = localStorage.getItem("ryos:theme:dark");
              var pref = null;
              if (rawDark) {
                var parsedDark = JSON.parse(rawDark);
                if (
                  parsedDark &&
                  typeof parsedDark === "object" &&
                  parsedDark[theme] !== undefined &&
                  parsedDark[theme] !== null
                ) {
                  pref = parsedDark[theme];
                }
              }
              if (pref === true || pref === "dark") isDarkBoot = true;
              else if (pref === false || pref === "light") isDarkBoot = false;
              else isDarkBoot = systemDark;
            } catch (e1) {}

            if (isDarkBoot) {
              root.dataset.osColorScheme = "dark";
              root.style.colorScheme = "dark";
              root.classList.add("dark");
            }
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script src="/app-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
