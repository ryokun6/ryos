name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force a Coolify deploy even if no source changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Bun ${{ matrix.bun-version }})
    # Only run on pull requests. Pushes to main go straight to image build +
    # Coolify deploy; PR CI is responsible for running tests before merge.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    # Only run on pull requests. Pushes to main skip this job since the
    # Dockerfile already runs the production build inside the image step.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GIT_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check and build
        run: bun run build

  image:
    name: Build & push Docker image to GHCR
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/ryokun6/ryos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prefer a long-lived PAT (secrets.GHCR_PAT) when configured, falling
      # back to the auto-injected GITHUB_TOKEN otherwise. The PAT path is
      # the escape hatch for the first push to a new user-namespace package
      # (and for repos where org settings restrict the GITHUB_TOKEN's
      # `packages: write` upgrade). Once the package exists and the repo's
      # workflow permissions allow it, GITHUB_TOKEN is sufficient.
      - name: Report which GHCR credential will be used
        env:
          HAS_PAT: ${{ secrets.GHCR_PAT != '' }}
        run: |
          if [ "${HAS_PAT}" = "true" ]; then
            echo "Using GHCR_PAT (PAT owner: ${{ github.repository_owner }})"
          else
            echo "Using GITHUB_TOKEN (actor: ${{ github.actor }})"
            echo "::notice::No GHCR_PAT secret set; falling back to GITHUB_TOKEN. If this push 403s, see PR description for fix options."
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PAT != '' && github.repository_owner || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:latest"
            echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # GIT_COMMIT_SHA is consumed by `scripts/generate-build-version.ts`
          # inside the Dockerfile so the built image's `public/version.json`
          # reports the real commit instead of falling back to 'dev'.
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image summary
        run: |
          {
            echo "## Pushed Docker image"
            echo
            echo "- \`${IMAGE_NAME}:latest\`"
            echo "- \`${IMAGE_NAME}:sha-${GITHUB_SHA}\`"
            echo
            echo "Coolify can now pull \`${IMAGE_NAME}:latest\` for the next deploy."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Coolify (production)
    needs: [image]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.COOLIFY_APP_URL }}
    timeout-minutes: 15
    steps:
      - name: Verify Coolify secrets are configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "::error::Missing required secret COOLIFY_WEBHOOK_URL."
            echo "Set it under Settings -> Secrets and variables -> Actions."
            echo "Example: https://coolify.example.com/api/v1/deploy?uuid=<resource-uuid>&force=false"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error::Missing required secret COOLIFY_TOKEN (Coolify API token)."
            exit 1
          fi
          echo "Coolify secrets are configured."

      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy || 'false' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          url="${COOLIFY_WEBHOOK_URL}"
          if [ "${FORCE_DEPLOY}" = "true" ]; then
            if printf '%s' "${url}" | grep -q '?'; then
              url="${url}&force=true"
            else
              url="${url}?force=true"
            fi
            echo "Force deploy requested."
          fi

          # Mask URL in logs to avoid leaking the resource UUID.
          echo "::add-mask::${url}"

          echo "Triggering Coolify deploy for commit ${COMMIT_SHA}..."

          # Retry up to 3 times on transient network/5xx errors.
          attempt=1
          max_attempts=3
          while : ; do
            http_code=$(curl --silent --show-error --output /tmp/coolify_response.json \
              --write-out "%{http_code}" \
              --request GET \
              --max-time 60 \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
              --header "Accept: application/json" \
              "${url}") || http_code="000"

            echo "Coolify responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"
            if [ -s /tmp/coolify_response.json ]; then
              echo "Response body:"
              cat /tmp/coolify_response.json
              echo
            fi

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Coolify deploy successfully triggered."
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::Coolify webhook failed after ${max_attempts} attempts (last HTTP ${http_code})."
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Summary
        if: success()
        run: |
          {
            echo "## Coolify deploy triggered"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: @${{ github.actor }}"
            echo
            echo "Coolify will pull \`ghcr.io/ryokun6/ryos:latest\` (sha-${{ github.sha }}) and roll out the new image."
          } >> "$GITHUB_STEP_SUMMARY"
