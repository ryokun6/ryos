name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force a Coolify deploy even if no source changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GIT_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check and build
        run: bun run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Coolify (production)
    needs: [test, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.COOLIFY_APP_URL }}
    timeout-minutes: 15
    steps:
      - name: Verify Coolify secrets are configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "::error::Missing required secret COOLIFY_WEBHOOK_URL."
            echo "Set it under Settings -> Secrets and variables -> Actions."
            echo "Example: https://coolify.example.com/api/v1/deploy?uuid=<resource-uuid>&force=false"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error::Missing required secret COOLIFY_TOKEN (Coolify API token)."
            exit 1
          fi
          echo "Coolify secrets are configured."

      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy || 'false' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          url="${COOLIFY_WEBHOOK_URL}"
          if [ "${FORCE_DEPLOY}" = "true" ]; then
            if printf '%s' "${url}" | grep -q '?'; then
              url="${url}&force=true"
            else
              url="${url}?force=true"
            fi
            echo "Force deploy requested."
          fi

          # Mask URL in logs to avoid leaking the resource UUID.
          echo "::add-mask::${url}"

          echo "Triggering Coolify deploy for commit ${COMMIT_SHA}..."

          # Retry up to 3 times on transient network/5xx errors.
          attempt=1
          max_attempts=3
          while : ; do
            http_code=$(curl --silent --show-error --output /tmp/coolify_response.json \
              --write-out "%{http_code}" \
              --request GET \
              --max-time 60 \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
              --header "Accept: application/json" \
              "${url}") || http_code="000"

            echo "Coolify responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"
            if [ -s /tmp/coolify_response.json ]; then
              echo "Response body:"
              cat /tmp/coolify_response.json
              echo
            fi

            # Coolify can return HTTP 200 with a body that actually describes a
            # failure (e.g. resource not deployable). A successful response
            # contains a deployment_uuid for each entry in "deployments". If
            # the body is JSON of the expected shape, require every entry to
            # have a deployment_uuid; otherwise treat the call as failed.
            body_ok=true
            body_messages=""
            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ] \
               && [ -s /tmp/coolify_response.json ] \
               && command -v jq >/dev/null 2>&1 \
               && jq -e '.deployments | type == "array"' \
                    /tmp/coolify_response.json >/dev/null 2>&1; then
              total=$(jq '.deployments | length' /tmp/coolify_response.json)
              ok=$(jq '[.deployments[] | select((.deployment_uuid // "") != "")] | length' \
                   /tmp/coolify_response.json)
              if [ "${total}" -eq 0 ] || [ "${ok}" -lt "${total}" ]; then
                body_ok=false
                body_messages=$(jq -r '[.deployments[].message // ""] | map(select(. != "")) | join(" | ")' \
                                /tmp/coolify_response.json)
              fi
            fi

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ] && [ "${body_ok}" = "true" ]; then
              echo "Coolify deploy successfully triggered."
              break
            fi

            if [ "${body_ok}" = "false" ]; then
              echo "::warning::Coolify accepted the request (HTTP ${http_code}) but did not queue a deployment: ${body_messages}"
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              if [ "${body_ok}" = "false" ]; then
                echo "::error::Coolify deploy failed: ${body_messages}"
              else
                echo "::error::Coolify webhook failed after ${max_attempts} attempts (last HTTP ${http_code})."
              fi
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Summary
        if: success()
        run: |
          {
            echo "## Coolify deploy triggered"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: @${{ github.actor }}"
            echo
            echo "Coolify will pull the latest commit and rebuild the Dockerfile image."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-preview:
    name: Deploy preview to Coolify
    needs: [test, build]
    # Only run on PRs from the same repository (forks cannot access secrets).
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview
      # Mirrors the Coolify Preview URL Template ({{pr_id}}-preview.os.ryo.lu)
      # so the GitHub PR check links straight to the per-PR preview.
      url: https://${{ github.event.pull_request.number }}-preview.os.ryo.lu
    timeout-minutes: 15
    steps:
      - name: Verify Coolify secrets are configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "::error::Missing required secret COOLIFY_WEBHOOK_URL."
            echo "Set it under Settings -> Secrets and variables -> Actions."
            echo "Per-PR previews reuse the production app's deploy webhook and append '&pr=<NUMBER>',"
            echo "so the URL must not contain 'tag', 'pr', or 'pull_request_id' query parameters."
            echo "Example: https://coolify.example.com/api/v1/deploy?uuid=<app-uuid>"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error::Missing required secret COOLIFY_TOKEN (Coolify API token)."
            exit 1
          fi
          echo "Coolify secrets are configured."

      - name: Trigger Coolify preview deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          token="${COOLIFY_TOKEN}"
          base_url="${COOLIFY_WEBHOOK_URL}"

          # Validate PR number is a positive integer before interpolating into the URL.
          if ! printf '%s' "${PR_NUMBER}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "::error::Invalid PR_NUMBER '${PR_NUMBER}'."
            exit 1
          fi

          # Coolify rejects combining 'pr' with 'tag'. Refuse misconfigured URLs early.
          if printf '%s' "${base_url}" | grep -Eq '(\?|&)tag='; then
            echo "::error::COOLIFY_WEBHOOK_URL contains a 'tag' query parameter."
            echo "Coolify cannot combine 'tag' with 'pr'. Remove 'tag=...' from the secret."
            exit 1
          fi

          # If the secret already pins a PR, refuse rather than send a confusing request.
          if printf '%s' "${base_url}" | grep -Eq '(\?|&)(pr|pull_request_id)='; then
            echo "::error::COOLIFY_WEBHOOK_URL already contains a 'pr' or 'pull_request_id' query parameter."
            echo "The workflow appends '&pr=<PR_NUMBER>' itself. Remove it from the secret."
            exit 1
          fi

          # Append '&pr=<PR_NUMBER>' (or '?pr=' if the URL has no query string yet)
          # to trigger Coolify's native Preview Deployment for this PR.
          if printf '%s' "${base_url}" | grep -q '?'; then
            url="${base_url}&pr=${PR_NUMBER}"
          else
            url="${base_url}?pr=${PR_NUMBER}"
          fi

          # Mask both URLs in logs to avoid leaking the resource UUID.
          echo "::add-mask::${base_url}"
          echo "::add-mask::${url}"

          echo "Triggering Coolify preview deploy for PR #${PR_NUMBER} (${PR_HEAD_REF} @ ${PR_HEAD_SHA})..."

          # Retry up to 4 times. The first request may race the GitHub App's
          # 'pull_request' webhook delivery to Coolify, which is what creates
          # the per-PR ApplicationPreview record that '?pr=' looks up.
          attempt=1
          max_attempts=4
          while : ; do
            http_code=$(curl --silent --show-error --output /tmp/coolify_preview_response.json \
              --write-out "%{http_code}" \
              --request GET \
              --max-time 60 \
              --header "Authorization: Bearer ${token}" \
              --header "Accept: application/json" \
              "${url}") || http_code="000"

            echo "Coolify responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"
            if [ -s /tmp/coolify_preview_response.json ]; then
              echo "Response body:"
              cat /tmp/coolify_preview_response.json
              echo
            fi

            # Coolify's preview deploy endpoint returns HTTP 200 even when it
            # cannot queue a deployment (for example, when no preview record
            # exists for this PR yet, the body is:
            #   {"deployments":[{"message":"Pull request <N> not found for this resource.",...}]}
            # ). A truly successful response includes a deployment_uuid on
            # every entry. If the body is parseable JSON of the expected
            # shape, require deployment_uuid on every deployments[] entry;
            # otherwise treat the call as failed.
            body_ok=true
            body_messages=""
            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ] \
               && [ -s /tmp/coolify_preview_response.json ] \
               && command -v jq >/dev/null 2>&1 \
               && jq -e '.deployments | type == "array"' \
                    /tmp/coolify_preview_response.json >/dev/null 2>&1; then
              total=$(jq '.deployments | length' /tmp/coolify_preview_response.json)
              ok=$(jq '[.deployments[] | select((.deployment_uuid // "") != "")] | length' \
                   /tmp/coolify_preview_response.json)
              if [ "${total}" -eq 0 ] || [ "${ok}" -lt "${total}" ]; then
                body_ok=false
                body_messages=$(jq -r '[.deployments[].message // ""] | map(select(. != "")) | join(" | ")' \
                                /tmp/coolify_preview_response.json)
              fi
            fi

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ] && [ "${body_ok}" = "true" ]; then
              echo "Coolify preview deploy successfully triggered."
              break
            fi

            if [ "${body_ok}" = "false" ]; then
              echo "::warning::Coolify accepted the request (HTTP ${http_code}) but did not queue a preview deployment: ${body_messages}"
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              if [ "${body_ok}" = "false" ]; then
                echo "::error::Coolify preview deploy failed: ${body_messages}"
                if printf '%s' "${body_messages}" | grep -qi 'not found'; then
                  echo
                  echo "Coolify has no preview record for PR #${PR_NUMBER} on this resource."
                  echo
                  echo "Likely causes:"
                  echo "  * The Coolify GitHub App is not installed on this repository, or"
                  echo "    'Preview Deployments' is not enabled on the source"
                  echo "    (Sources -> <your GitHub App>; permissions must include"
                  echo "    Pull Requests: Read & write, with the 'Pull requests' event subscribed)."
                  echo "  * The 'pull_request' webhook delivery to Coolify failed or was"
                  echo "    delivered before preview deploys were enabled on the application."
                  echo "  * 'Allow Public PR Deployments' is off and the PR author is not a"
                  echo "    repository member, collaborator, or contributor."
                  echo
                  echo "Fixes:"
                  echo "  * Open the application in Coolify -> 'Preview Deployments' tab and"
                  echo "    click 'Load Pull Requests', then re-run this workflow."
                  echo "  * Verify the GitHub App permissions and 'Pull requests' subscription,"
                  echo "    then redeliver the webhook from GitHub -> Settings -> Webhooks."
                  echo "  * See https://coolify.io/docs/applications/ci-cd/github/preview-deploy"
                fi
              else
                echo "::error::Coolify preview webhook failed after ${max_attempts} attempts (last HTTP ${http_code})."
              fi
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Summary
        if: success()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          preview_url="https://${PR_NUMBER}-preview.os.ryo.lu"
          {
            echo "## Coolify preview deploy triggered"
            echo
            echo "- Preview: [${preview_url}](${preview_url})"
            echo "- PR: #${PR_NUMBER}"
            echo "- Branch: \`${PR_HEAD_REF}\`"
            echo "- Commit: \`${PR_HEAD_SHA}\`"
            echo "- Actor: @${ACTOR}"
            echo
            echo "Coolify is building a per-PR preview using the configured URL template"
            echo "(\`{{pr_id}}-preview.os.ryo.lu\`)."
          } >> "$GITHUB_STEP_SUMMARY"
