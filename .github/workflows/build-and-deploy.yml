name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force a Coolify deploy even if no source changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Unit tests (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check test registration
        run: bun run test:registration

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GIT_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check and build
        run: bun run build

  api-test:
    name: API integration tests (Bun 1.3.9)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      REDIS_URL: redis://127.0.0.1:6379/0
      TRUSTED_PROXY_COUNT: "1"
      TELEGRAM_BOT_API_BASE_URL: http://127.0.0.1:3899
      TELEGRAM_BOT_TOKEN: telegram-test-token
      TELEGRAM_WEBHOOK_SECRET: telegram-test-secret
      REALTIME_PROVIDER: local
      STORAGE_PROVIDER: s3
      S3_BUCKET: test-bucket
      S3_REGION: us-east-1
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_PUBLIC_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY_ID: test-access-key
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_FORCE_PATH_STYLE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start standalone API and run integration tests
        shell: bash
        run: |
          set -euo pipefail
          bun run scripts/api-standalone-server.ts > /tmp/ryos-api.log 2>&1 &
          api_pid=$!
          cleanup() {
            status=$?
            kill "${api_pid}" 2>/dev/null || true
            wait "${api_pid}" 2>/dev/null || true
            if [ "${status}" -ne 0 ]; then
              echo "::group::Standalone API log"
              sed -n '1,300p' /tmp/ryos-api.log
              echo "::endgroup::"
            fi
            exit "${status}"
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:3000/health >/dev/null; then
              break
            fi
            if ! kill -0 "${api_pid}" 2>/dev/null; then
              echo "::error::Standalone API exited before becoming healthy."
              exit 1
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "::error::Standalone API did not become healthy."
              exit 1
            fi
            sleep 1
          done

          bun run test:api

  image:
    name: Build & push Docker image to GHCR
    needs: [test, build, api-test]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/ryokun6/ryos
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Prefer a long-lived PAT (secrets.GHCR_PAT) when configured, falling
      # back to the auto-injected GITHUB_TOKEN otherwise. The PAT path is
      # the escape hatch for the first push to a new user-namespace package
      # (and for repos where org settings restrict the GITHUB_TOKEN's
      # `packages: write` upgrade). Once the package exists and the repo's
      # workflow permissions allow it, GITHUB_TOKEN is sufficient.
      - name: Report which GHCR credential will be used
        env:
          HAS_PAT: ${{ secrets.GHCR_PAT != '' }}
        run: |
          if [ "${HAS_PAT}" = "true" ]; then
            echo "Using GHCR_PAT (PAT owner: ${{ github.repository_owner }})"
          else
            echo "Using GITHUB_TOKEN (actor: ${{ github.actor }})"
            echo "::notice::No GHCR_PAT secret set; falling back to GITHUB_TOKEN. If this push 403s, see PR description for fix options."
          fi

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PAT != '' && github.repository_owner || github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # GIT_COMMIT_SHA is consumed by `scripts/generate-build-version.ts`
          # inside the Dockerfile so the built image's `public/version.json`
          # reports the real commit instead of falling back to 'dev'.
          build-args: |
            GIT_COMMIT_SHA=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Image summary
        run: |
          {
            echo "## Pushed Docker image"
            echo
            echo "- \`${IMAGE_NAME}:sha-${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Coolify (production)
    needs: [image]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.COOLIFY_APP_URL }}
    timeout-minutes: 15
    steps:
      - name: Verify deployment configuration
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_URL: ${{ vars.COOLIFY_APP_URL }}
        run: |
          set -euo pipefail
          for name in COOLIFY_API_URL COOLIFY_APP_UUID COOLIFY_TOKEN COOLIFY_APP_URL; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required Coolify setting: ${name}."
              exit 1
            fi
          done

      - name: Select immutable image and deploy
        env:
          COOLIFY_API_URL: ${{ secrets.COOLIFY_API_URL }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy || 'false' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          api="${COOLIFY_API_URL%/}/api/v1"
          image_tag="sha-${COMMIT_SHA}"
          echo "::add-mask::${COOLIFY_APP_UUID}"

          update_code=$(curl --silent --show-error --output /tmp/coolify-update.json \
            --write-out "%{http_code}" --request PATCH --max-time 60 \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$(jq -cn --arg tag "${image_tag}" '{docker_registry_image_tag: $tag}')" \
            "${api}/applications/${COOLIFY_APP_UUID}")
          if [ "${update_code}" -lt 200 ] || [ "${update_code}" -ge 300 ]; then
            echo "::error::Coolify rejected immutable image tag ${image_tag} (HTTP ${update_code})."
            exit 1
          fi

          deploy_code=$(curl --silent --show-error --output /tmp/coolify-deploy.json \
            --write-out "%{http_code}" --request GET --max-time 60 \
            --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
            --header "Accept: application/json" \
            "${api}/deploy?uuid=${COOLIFY_APP_UUID}&force=${FORCE_DEPLOY}")
          if [ "${deploy_code}" -lt 200 ] || [ "${deploy_code}" -ge 300 ]; then
            echo "::error::Coolify deploy failed to start (HTTP ${deploy_code})."
            exit 1
          fi

      - name: Verify production health and version
        env:
          COOLIFY_APP_URL: ${{ vars.COOLIFY_APP_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base_url="${COOLIFY_APP_URL%/}"
          for attempt in $(seq 1 48); do
            health_ok=false
            version_ok=false
            if curl --fail --silent --show-error --max-time 10 \
              "${base_url}/health" | jq -e '.ok == true' >/dev/null; then
              health_ok=true
            fi
            if curl --fail --silent --show-error --max-time 10 \
              "${base_url}/version.json" | jq -e --arg sha "${COMMIT_SHA}" \
              '.commitSha == $sha' >/dev/null; then
              version_ok=true
            fi
            if [ "${health_ok}" = "true" ] && [ "${version_ok}" = "true" ]; then
              echo "Production is healthy and serves commit ${COMMIT_SHA}."
              exit 0
            fi
            echo "Waiting for production commit ${COMMIT_SHA} (${attempt}/48)..."
            sleep 10
          done
          echo "::error::Production did not become healthy on commit ${COMMIT_SHA} within 8 minutes."
          exit 1

      - name: Summary
        if: success()
        run: |
          {
            echo "## Coolify deployment verified"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: @${{ github.actor }}"
            echo "- Image: \`ghcr.io/ryokun6/ryos:sha-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
