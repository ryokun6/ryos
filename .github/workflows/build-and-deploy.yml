name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force a Coolify deploy even if no source changes"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit

  build:
    name: Build (Bun ${{ matrix.bun-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        bun-version: ["1.3.9"]
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
      GIT_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check and build
        run: bun run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Coolify (production)
    needs: [test, build]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.COOLIFY_APP_URL }}
    timeout-minutes: 15
    steps:
      - name: Verify Coolify secrets are configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "::error::Missing required secret COOLIFY_WEBHOOK_URL."
            echo "Set it under Settings -> Secrets and variables -> Actions."
            echo "Example: https://coolify.example.com/api/v1/deploy?uuid=<resource-uuid>&force=false"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error::Missing required secret COOLIFY_TOKEN (Coolify API token)."
            exit 1
          fi
          echo "Coolify secrets are configured."

      - name: Trigger Coolify deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy || 'false' }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          url="${COOLIFY_WEBHOOK_URL}"
          if [ "${FORCE_DEPLOY}" = "true" ]; then
            if printf '%s' "${url}" | grep -q '?'; then
              url="${url}&force=true"
            else
              url="${url}?force=true"
            fi
            echo "Force deploy requested."
          fi

          # Mask URL in logs to avoid leaking the resource UUID.
          echo "::add-mask::${url}"

          echo "Triggering Coolify deploy for commit ${COMMIT_SHA}..."

          # Retry up to 3 times on transient network/5xx errors.
          attempt=1
          max_attempts=3
          while : ; do
            http_code=$(curl --silent --show-error --output /tmp/coolify_response.json \
              --write-out "%{http_code}" \
              --request GET \
              --max-time 60 \
              --header "Authorization: Bearer ${COOLIFY_TOKEN}" \
              --header "Accept: application/json" \
              "${url}") || http_code="000"

            echo "Coolify responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"
            if [ -s /tmp/coolify_response.json ]; then
              echo "Response body:"
              cat /tmp/coolify_response.json
              echo
            fi

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Coolify deploy successfully triggered."
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::Coolify webhook failed after ${max_attempts} attempts (last HTTP ${http_code})."
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Summary
        if: success()
        run: |
          {
            echo "## Coolify deploy triggered"
            echo
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- Actor: @${{ github.actor }}"
            echo
            echo "Coolify will pull the latest commit and rebuild the Dockerfile image."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-preview:
    name: Deploy preview to Coolify
    needs: [test, build]
    # Only run on PRs from the same repository (forks cannot access secrets).
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: preview
      # Mirrors the Coolify Preview URL Template ({{pr_id}}-preview.os.ryo.lu)
      # so the GitHub PR check links straight to the per-PR preview.
      url: https://${{ github.event.pull_request.number }}-preview.os.ryo.lu
    timeout-minutes: 15
    steps:
      - name: Verify Coolify secrets are configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${COOLIFY_WEBHOOK_URL}" ]; then
            echo "::error::Missing required secret COOLIFY_WEBHOOK_URL."
            echo "Set it under Settings -> Secrets and variables -> Actions."
            echo "Per-PR previews reuse the production app's deploy webhook and append '&pr=<NUMBER>',"
            echo "so the URL must not contain 'tag', 'pr', or 'pull_request_id' query parameters."
            echo "Example: https://coolify.example.com/api/v1/deploy?uuid=<app-uuid>"
            exit 1
          fi
          if [ -z "${COOLIFY_TOKEN}" ]; then
            echo "::error::Missing required secret COOLIFY_TOKEN (Coolify API token)."
            exit 1
          fi
          echo "Coolify secrets are configured."

      - name: Trigger Coolify preview deploy webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          token="${COOLIFY_TOKEN}"
          base_url="${COOLIFY_WEBHOOK_URL}"

          # Validate PR number is a positive integer before interpolating into the URL.
          if ! printf '%s' "${PR_NUMBER}" | grep -Eq '^[1-9][0-9]*$'; then
            echo "::error::Invalid PR_NUMBER '${PR_NUMBER}'."
            exit 1
          fi

          # Coolify rejects combining 'pr' with 'tag'. Refuse misconfigured URLs early.
          if printf '%s' "${base_url}" | grep -Eq '(\?|&)tag='; then
            echo "::error::COOLIFY_WEBHOOK_URL contains a 'tag' query parameter."
            echo "Coolify cannot combine 'tag' with 'pr'. Remove 'tag=...' from the secret."
            exit 1
          fi

          # If the secret already pins a PR, refuse rather than send a confusing request.
          if printf '%s' "${base_url}" | grep -Eq '(\?|&)(pr|pull_request_id)='; then
            echo "::error::COOLIFY_WEBHOOK_URL already contains a 'pr' or 'pull_request_id' query parameter."
            echo "The workflow appends '&pr=<PR_NUMBER>' itself. Remove it from the secret."
            exit 1
          fi

          # Append '&pr=<PR_NUMBER>' (or '?pr=' if the URL has no query string yet)
          # to trigger Coolify's native Preview Deployment for this PR.
          if printf '%s' "${base_url}" | grep -q '?'; then
            url="${base_url}&pr=${PR_NUMBER}"
          else
            url="${base_url}?pr=${PR_NUMBER}"
          fi

          # Mask both URLs in logs to avoid leaking the resource UUID.
          echo "::add-mask::${base_url}"
          echo "::add-mask::${url}"

          echo "Triggering Coolify preview deploy for PR #${PR_NUMBER} (${PR_HEAD_REF} @ ${PR_HEAD_SHA})..."

          # Retry up to 3 times on transient network/5xx errors.
          attempt=1
          max_attempts=3
          while : ; do
            http_code=$(curl --silent --show-error --output /tmp/coolify_preview_response.json \
              --write-out "%{http_code}" \
              --request GET \
              --max-time 60 \
              --header "Authorization: Bearer ${token}" \
              --header "Accept: application/json" \
              "${url}") || http_code="000"

            echo "Coolify responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"
            if [ -s /tmp/coolify_preview_response.json ]; then
              echo "Response body:"
              cat /tmp/coolify_preview_response.json
              echo
            fi

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Coolify preview deploy successfully triggered."
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::Coolify preview webhook failed after ${max_attempts} attempts (last HTTP ${http_code})."
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Summary
        if: success()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          preview_url="https://${PR_NUMBER}-preview.os.ryo.lu"
          {
            echo "## Coolify preview deploy triggered"
            echo
            echo "- Preview: [${preview_url}](${preview_url})"
            echo "- PR: #${PR_NUMBER}"
            echo "- Branch: \`${PR_HEAD_REF}\`"
            echo "- Commit: \`${PR_HEAD_SHA}\`"
            echo "- Actor: @${ACTOR}"
            echo
            echo "Coolify is building a per-PR preview using the configured URL template"
            echo "(\`{{pr_id}}-preview.os.ryo.lu\`)."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-telegram:
    name: Notify Telegram
    needs: [test, build, deploy, deploy-preview]
    # Run after every run that reaches this point, even on failure/cancel,
    # so we always send a status notification when the bot is configured.
    if: |
      always() &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: forum/supergroup topic id (integer). Leave unset for the
          # default chat. https://core.telegram.org/bots/api#sendmessage
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          DEPLOY_PREVIEW_RESULT: ${{ needs.deploy-preview.result }}
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured (TELEGRAM_BOT_TOKEN and/or TELEGRAM_CHAT_ID). Skipping notification."
            exit 0
          fi

          # Roll up needs.*.result into a single workflow status.
          # Possible per-job values: success, failure, cancelled, skipped.
          status="success"
          for r in "${TEST_RESULT}" "${BUILD_RESULT}" "${DEPLOY_RESULT}" "${DEPLOY_PREVIEW_RESULT}"; do
            case "${r}" in
              failure)
                status="failure"
                ;;
              cancelled)
                if [ "${status}" != "failure" ]; then
                  status="cancelled"
                fi
                ;;
            esac
          done

          short_sha="${COMMIT_SHA:0:7}"
          run_url="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          commit_url="${SERVER_URL}/${REPO}/commit/${COMMIT_SHA}"

          # Build a plain-text message body. Plain text avoids the need to
          # escape Markdown/HTML special characters in PR titles, branch
          # names, etc., which removes a class of formatting bugs.
          {
            echo "[${REPO}] ${status^^}"
            echo
            if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER}" ]; then
              echo "Event: pull_request #${PR_NUMBER}"
              if [ -n "${PR_TITLE}" ]; then
                echo "Title: ${PR_TITLE}"
              fi
              echo "Branch: ${PR_HEAD_REF}"
              echo "Commit: ${PR_HEAD_SHA:0:7}"
              echo "Preview: https://${PR_NUMBER}-preview.os.ryo.lu"
            else
              echo "Event: ${EVENT_NAME}"
              echo "Ref: ${REF}"
              echo "Commit: ${short_sha}"
              echo "Commit URL: ${commit_url}"
            fi
            echo "Actor: ${ACTOR}"
            echo
            echo "Jobs:"
            echo "- test: ${TEST_RESULT}"
            echo "- build: ${BUILD_RESULT}"
            echo "- deploy: ${DEPLOY_RESULT}"
            echo "- deploy-preview: ${DEPLOY_PREVIEW_RESULT}"
            echo
            echo "Run: ${run_url}"
          } > /tmp/telegram_message.txt

          api_url="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
          # Mask the API URL so the bot token never appears in logs.
          echo "::add-mask::${api_url}"
          echo "::add-mask::${TELEGRAM_BOT_TOKEN}"

          # Build curl args safely. Using --data-urlencode means the message
          # body, chat id, and thread id are sent as form fields and can
          # contain arbitrary characters without breaking the request or
          # being interpreted by the shell.
          curl_args=(
            --silent --show-error
            --max-time 30
            --output /tmp/telegram_response.json
            --write-out "%{http_code}"
            --request POST
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}"
            --data-urlencode "disable_web_page_preview=true"
            --data-urlencode "text@/tmp/telegram_message.txt"
          )
          if [ -n "${TELEGRAM_THREAD_ID}" ]; then
            curl_args+=(--data-urlencode "message_thread_id=${TELEGRAM_THREAD_ID}")
          fi

          # Retry up to 3 times on transient network/5xx errors.
          attempt=1
          max_attempts=3
          while : ; do
            http_code=$(curl "${curl_args[@]}" "${api_url}") || http_code="000"
            echo "Telegram responded with HTTP ${http_code} (attempt ${attempt}/${max_attempts})"

            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Telegram notification sent."
              break
            fi

            # 4xx (other than 429) is a configuration problem; don't retry.
            if [ "${http_code}" -ge 400 ] && [ "${http_code}" -lt 500 ] && [ "${http_code}" != "429" ]; then
              echo "::warning::Telegram API returned HTTP ${http_code}. Check TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, and TELEGRAM_THREAD_ID."
              if [ -s /tmp/telegram_response.json ]; then
                # The response body may include error_description but never
                # the bot token, so it is safe to print.
                echo "Response body:"
                cat /tmp/telegram_response.json
                echo
              fi
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::warning::Telegram notification failed after ${max_attempts} attempts (last HTTP ${http_code})."
              break
            fi

            sleep_seconds=$((attempt * 5))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done
