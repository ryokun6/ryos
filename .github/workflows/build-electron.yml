name: Build Electron

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-electron-${{ github.ref }}
  cancel-in-progress: false

# Pinned checkout, cache, setup-node, and artifact actions run on Node 24
# (Node 20 deprecated on GitHub-hosted runners — see GitHub changelog 2025-09-19).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# macOS job secrets (Settings → Secrets → Actions), mirroring .env.local:
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#   APPLE_API_ISSUER, APPLE_API_KEY (Key ID), APPLE_API_KEY_P8 (.p8 file contents)
#   EVS_ACCOUNT_NAME, EVS_PASSWD (Castlabs EVS — production Widevine VMP signing)
# Windows release signing:
#   WINDOWS_CERTIFICATE (base64 PFX), WINDOWS_CERTIFICATE_PASSWORD

jobs:
  build-mac:
    name: Build macOS desktop app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Castlabs EVS client
        run: |
          python3 -m venv .evs-venv
          .evs-venv/bin/pip install castlabs-evs==1.3.2
          echo "PYTHON=${{ github.workspace }}/.evs-venv/bin/python3" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          if [ -z "${APPLE_API_KEY_P8}" ]; then
            echo "::error::Missing secret APPLE_API_KEY_P8 (contents of the .p8 file)."
            exit 1
          fi
          mkdir -p build
          printf '%s' "${APPLE_API_KEY_P8}" > build/apple.p8

      - name: Build macOS artifacts (signed + notarized)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: build/apple.p8
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
        run: bun run electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: electron-mac
          # Installer (dmg) + auto-update feed (zip, blockmap, latest-mac.yml).
          # Do not use release/* — upload-artifact globs recurse into .app / unpacked dirs.
          path: |
            release/*.dmg
            release/*.zip
            release/*.zip.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.9"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Castlabs EVS client
        shell: pwsh
        run: |
          python -m venv .evs-venv
          .evs-venv\Scripts\pip install castlabs-evs==1.3.2
          "PYTHON=${{ github.workspace }}/.evs-venv/Scripts/python.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Require Windows signing secrets for releases
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
                [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
              Write-Error "Tagged releases require WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD."
              exit 1
            }
          }

      - name: Build Windows artifacts
        env:
          EVS_ACCOUNT_NAME: ${{ secrets.EVS_ACCOUNT_NAME }}
          EVS_PASSWD: ${{ secrets.EVS_PASSWD }}
          CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: bun run electron:build:windows

      - name: Prune unpacked Windows output
        shell: pwsh
        run: |
          if (Test-Path release/win-unpacked) {
            Remove-Item -Recurse -Force release/win-unpacked
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: electron-windows
          # NSIS installer + blockmap + auto-update feed (latest.yml).
          # Never release/* — globs recurse into win-unpacked.
          path: |
            release/ryOS_*.exe
            release/ryOS_*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: electron-mac
          path: release/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: electron-windows
          path: release/windows

      - name: Resolve release tag
        id: release
        run: |
          # workflow_dispatch runs on refs/heads/main; never use the branch name as a tag
          # (it collides with refs/heads/main and breaks `git pull origin main`).
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "name=ryOS ${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "make_latest=true" >> "${GITHUB_OUTPUT}"
            echo "overwrite_assets=false" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=desktop" >> "${GITHUB_OUTPUT}"
            echo "name=ryOS desktop" >> "${GITHUB_OUTPUT}"
            echo "make_latest=true" >> "${GITHUB_OUTPUT}"
            echo "overwrite_assets=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.name }}
          make_latest: ${{ steps.release.outputs.make_latest }}
          overwrite_assets: ${{ steps.release.outputs.overwrite_assets }}
          generate_release_notes: true
          # Explicit globs only — release/** flattens win-unpacked into hundreds of junk assets.
          # latest-mac.yml / latest.yml + mac zip + blockmaps power electron-updater.
          files: |
            release/mac/*.dmg
            release/mac/*.zip
            release/mac/*.zip.blockmap
            release/mac/latest-mac.yml
            release/windows/ryOS_*.exe
            release/windows/ryOS_*.exe.blockmap
            release/windows/latest.yml
