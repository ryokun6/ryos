appId: lu.ryo.os
productName: ryOS
copyright: Copyright (c) 2026 Ryo Lu
directories:
  output: release
  buildResources: build
files:
  - dist-electron/**/*
  - package.json
asar: true
# Castlabs Electron for Content Security (Widevine CDM for Apple Music DRM).
electronDownload:
  mirror: https://github.com/castlabs/electron-releases/releases/download/v
# macOS: VMP-sign before code signing. Windows: VMP-sign after code signing.
afterPack: scripts/electron-vmp-after-pack.cjs
afterSign: scripts/electron-vmp-after-sign.cjs
extraMetadata:
  main: dist-electron/main.cjs
  name: ryos
  productName: ryOS
  description: A web-based desktop operating system, reimagining classic Mac OS, Windows, and more.
  author: Ryo Lu <me@ryo.lu> (https://ryo.lu)
  homepage: https://os.ryo.lu
  license: AGPL-3.0-only
mac:
  category: public.app-category.utilities
  target:
    - dmg
    # zip target is required for Squirrel.Mac auto-update (electron-updater).
    - zip
  icon: build/icon.icns
  artifactName: ryOS_${version}_aarch64.${ext}
  minimumSystemVersion: "10.13"
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  gatekeeperAssess: false
  extendInfo:
    CFBundleDisplayName: ryOS
    CFBundleName: ryOS
    NSHumanReadableCopyright: Copyright (c) 2026 Ryo Lu
    NSMicrophoneUsageDescription: ryOS needs microphone access for voice chat and recording features.
    NSCameraUsageDescription: ryOS needs camera access for Photo Booth and video chat features.
win:
  target:
    - nsis
  icon: build/icon.ico
  artifactName: ryOS_${version}_${arch}.${ext}
  signingHashAlgorithms:
    - sha256
  signAndEditExecutable: true
  verifyUpdateCodeSignature: true
linux:
  target:
    - AppImage
  category: Utility
  icon: build/icon.png
  artifactName: ryOS_${version}_${arch}.${ext}
publish:
  - provider: github
    owner: ryokun6
    repo: ryos
